name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: apps/web
        run: npx vite build
        env:
          CI: false

      - name: Verify build output
        run: |
          if [ ! -f apps/web/dist/index.html ]; then
            echo "ERROR: Frontend build failed - index.html not found"
            exit 1
          fi
          PAGE_COUNT=$(ls apps/web/dist/assets/Store*Page*.js 2>/dev/null | wc -l)
          echo "Found $PAGE_COUNT store page modules"
          if [ "$PAGE_COUNT" -lt 10 ]; then
            echo "ERROR: Too few page modules, build may be incomplete"
            exit 1
          fi
          echo "Build verification passed"

      - name: Checkout deploy repo
        uses: actions/checkout@v4
        with:
          repository: MingTu01/multi-shop-link-deploy
          token: ${{ secrets.DEPLOY_TOKEN }}
          path: deploy

      - name: Generate cleanup.json
        run: |
          cd deploy

          # 记录旧文件列表（仅 src/ 和 public/web-dist/ 中的代码文件）
          echo "[cleanup] Recording old file list..."
          find src/ public/web-dist/ -type f \( -name '*.js' -o -name '*.css' -o -name '*.html' -o -name '*.ts' \) 2>/dev/null | sort > /tmp/old-files.txt || true
          OLD_COUNT=$(wc -l < /tmp/old-files.txt)
          echo "[cleanup] Old files: $OLD_COUNT"

      - name: Update deploy repo
        run: |
          cd deploy

          # Preserve Docker/deploy-specific files
          for f in entrypoint.sh docker-compose.yml .dockerignore .gitignore post-upgrade.cjs; do
            if [ -f "$f" ]; then
              cp "$f" "/tmp/deploy-preserve-$f" 2>/dev/null || true
            fi
          done

          # Clean old source and build files
          rm -rf src/ public/ package.json package-lock.json tsconfig.json seed.ts *.traineddata 2>/dev/null || true

          # Copy server source
          cp -r ../apps/server/src/ src/

          # Copy container management tools
          cp ../apps/server/msl.js . 2>/dev/null || true
          cp ../.npmrc . 2>/dev/null || true
          cp ../apps/server/startup-check.js . 2>/dev/null || true
          cp ../apps/server/startup.sh . 2>/dev/null || true
          cp ../scripts/deploy/Dockerfile . 2>/dev/null || true

          # Copy frontend build
          mkdir -p public/web-dist
          cp -r ../apps/web/dist/* public/web-dist/

          # Copy public/reports
          mkdir -p public/reports
          cp -r ../apps/server/public/reports/* public/reports/ 2>/dev/null || true

          # Copy OCR training data
          cp ../apps/server/*.traineddata . 2>/dev/null || true

          # Copy package files
          cp ../apps/server/package.json .
          cp ../apps/server/package-lock.json . 2>/dev/null || true
          cp ../apps/server/tsconfig.json .
          cp ../apps/server/seed.ts . 2>/dev/null || true

          # Copy post-upgrade script
          cp ../apps/server/post-upgrade.cjs . 2>/dev/null || true

          # Restore preserved Docker files
          for f in entrypoint.sh docker-compose.yml .dockerignore .gitignore post-upgrade.cjs; do
            if [ -f "/tmp/deploy-preserve-$f" ]; then
              cp "/tmp/deploy-preserve-$f" "$f"
            fi
          done

          # Generate cleanup.json
          echo "[cleanup] Generating cleanup.json..."
          node ../scripts/generate-cleanup.js /tmp/old-files.txt public/web-dist/src src/ . || true

          # Read version from source server package.json
          VERSION=$(node -p "require('./package.json').version")
          mkdir -p data
          echo "{\"version\":\"$VERSION\"}" > data/version.json
          echo "Deploy version: $VERSION"

      - name: Commit and push
        run: |
          cd deploy
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          VERSION=$(node -p "require('./package.json').version")
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "build: v$VERSION"
            git push
            echo "Pushed v$VERSION to deploy repo"
          fi
