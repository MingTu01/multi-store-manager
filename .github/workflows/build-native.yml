name: Build Native Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web dependencies
        working-directory: apps/web
        run: npm install --legacy-peer-deps

      - name: Build web app
        working-directory: apps/web
        run: npx vite build

      - name: Install Capacitor + Android
        working-directory: apps/web
        run: npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/push-notifications @capacitor/camera @capacitor/filesystem --legacy-peer-deps

      - name: Init Capacitor
        working-directory: apps/web
        run: npx cap init "Multi Shop Link" com.mingshoplink.app --web-dir dist

      - name: Add Android platform
        working-directory: apps/web
        run: npx cap add android

      - name: Set app icon
        working-directory: apps/web
        run: |
          # Copy logo-192.png as app icon for all densities
          for dir in android/app/src/main/res/mipmap-mdpi android/app/src/main/res/mipmap-hdpi android/app/src/main/res/mipmap-xhdpi android/app/src/main/res/mipmap-xxhdpi android/app/src/main/res/mipmap-xxxhdpi; do
            cp public/logo-192.png "$dir/ic_launcher.png" 2>/dev/null || true
            cp public/logo-192.png "$dir/ic_launcher_round.png" 2>/dev/null || true
          done
          echo "Icons set"

      - name: Sync web to native
        working-directory: apps/web
        run: npx cap sync android

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: apps/web/android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MultiShopLink-Android-APK
          path: apps/web/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

  build-ios:
    name: Build iOS (macOS runner)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web dependencies
        working-directory: apps/web
        run: npm install --legacy-peer-deps

      - name: Build web app
        working-directory: apps/web
        run: npx vite build

      - name: Install Capacitor + iOS
        working-directory: apps/web
        run: npm install @capacitor/core @capacitor/cli @capacitor/ios @capacitor/push-notifications @capacitor/camera @capacitor/filesystem --legacy-peer-deps

      - name: Init Capacitor
        working-directory: apps/web
        run: npx cap init "Multi Shop Link" com.mingshoplink.app --web-dir dist

      - name: Add iOS platform (skip pod install)
        working-directory: apps/web
        run: npx cap add ios --no-pod-install

      - name: Set iOS minimum deployment target
        working-directory: apps/web
        run: |
          # Update Podfile deployment target
          sed -i '' "s/platform :ios, .*/platform :ios, '16.0'/" ios/App/Podfile
          # Update Xcode project deployment target
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 16.0/' ios/App/App.xcodeproj/project.pbxproj
          echo "iOS deployment target set to 16.0"

      - name: Pod install
        working-directory: apps/web/ios/App
        run: pod install

      - name: Sync web to native
        working-directory: apps/web
        run: npx cap sync ios

      - name: Build iOS Archive
        working-directory: apps/web/ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -allowProvisioningUpdates \
            archive

      - name: Upload iOS Archive
        uses: actions/upload-artifact@v4
        with:
          name: MultiShopLink-iOS-Archive
          path: apps/web/ios/App/build/App.xcarchive
          if-no-files-found: warn
