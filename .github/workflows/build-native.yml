name: Build Native Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web dependencies
        working-directory: apps/web
        run: npm install --legacy-peer-deps

      - name: Build web app
        working-directory: apps/web
        run: npx vite build

      - name: Install Capacitor
        working-directory: apps/web
        run: npm install @capacitor/core @capacitor/cli @capacitor/push-notifications @capacitor/camera @capacitor/filesystem --legacy-peer-deps

      - name: Init Capacitor
        working-directory: apps/web
        run: npx cap init "Multi Shop Link" com.mingshoplink.app --web-dir dist

      - name: Add Android platform
        working-directory: apps/web
        run: npx cap add android

      - name: Sync web to native
        working-directory: apps/web
        run: npx cap sync android

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: apps/web/android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MultiShopLink-Android-APK
          path: apps/web/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn

  build-ios:
    name: Build iOS (macOS runner)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web dependencies
        working-directory: apps/web
        run: npm install --legacy-peer-deps

      - name: Build web app
        working-directory: apps/web
        run: npx vite build

      - name: Install Capacitor
        working-directory: apps/web
        run: npm install @capacitor/core @capacitor/cli @capacitor/push-notifications @capacitor/camera @capacitor/filesystem --legacy-peer-deps

      - name: Init Capacitor
        working-directory: apps/web
        run: npx cap init "Multi Shop Link" com.mingshoplink.app --web-dir dist

      - name: Add iOS platform
        working-directory: apps/web
        run: npx cap add ios

      - name: Sync web to native
        working-directory: apps/web
        run: npx cap sync ios

      - name: Build iOS Archive
        working-directory: apps/web/ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            -allowProvisioningUpdates \
            archive

      - name: Upload iOS Archive
        uses: actions/upload-artifact@v4
        with:
          name: MultiShopLink-iOS-Archive
          path: apps/web/ios/App/build/App.xcarchive
          if-no-files-found: warn
