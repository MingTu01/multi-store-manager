services:
  app:
    build: .
    container_name: multi-shop-link
    ports:
      - "3001:3001"
    volumes:
      - app-data:/app/data
      - ./uploads:/app/uploads
      - ./backups:/app/backups
      - ./apps/server/public/web-dist:/app/public/web-dist
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:?请在.env文件中设置JWT_SECRET}
    restart: unless-stopped
volumes:
  app-data: