services:
  app:
    build: .
    container_name: multi-shop-link
    ports:
      - "3001:3001"
    volumes:
      - app-data:/app/data
      - ./uploads:/app/uploads
      - ./backups:/app/backups
      - ./apps/server/public/web-dist:/app/public/web-dist
    environment:
      - NODE_ENV=production
      - COOKIE_SECURE=false
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:?请在.env文件中设置JWT_SECRET}
      # 生产环境必须设置: 你的域名(含协议)，多个用逗号分隔
      # 例: CORS_ORIGIN=https://your-domain.com
      - CORS_ORIGIN=${CORS_ORIGIN:-}
    restart: unless-stopped
volumes:
  app-data:
